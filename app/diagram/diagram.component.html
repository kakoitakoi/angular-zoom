<!-- Тулбар зума -->

<div class="diagram-toolbar">
  <button (click)="zoomOut()">−</button>
  <span class="diagram-zoom-label">{{ zoomLabel }}</span>
  <button (click)="zoomIn()">+</button>
  <button (click)="resetView()">Reset</button>
</div>

<!-- Область диаграммы: pan и wheel слушаются здесь -->

<div
  class="diagram-host"
  #host
  [class.panning]="isPanning"
  (mousedown)="onHostMouseDown($event)"
  (wheel)="onWheel($event)">

  <!--
    SVG ПОВЕРХ всего, занимает весь host, НЕ трансформируется.
    Рёбра уже содержат готовые экранные координаты из render().
  -->

  <svg class="diagram-edges">
    <defs>
      <marker
        id="diagram-arrow"
        markerWidth="8"
        markerHeight="8"
        refX="7"
        refY="4"
        orient="auto">
        <path d="M0,0 L0,8 L8,4 z" fill="#555" />
      </marker>
    </defs>

    @for (edge of iEdges; track edge.id) {
      <path
        [attr.d]="edge.path"
        class="diagram-edge"
        marker-end="url(#diagram-arrow)" />
    }
  </svg>

  <!--
    Узлы. Каждый — div-обёртка (ловит drag) + button внутри (ловит click).
    left/top задают ЦЕНТР узла; transform сдвигает на -50%/-50% и масштабирует.
    Важно: z-index обёртки > z-index SVG, чтобы узлы были кликабельны.
  -->

  @for (node of iNodes; track node.id; let i = $index) {
    <div
      class="diagram-node-wrapper"
      [class.dragging]="dragIdx === i"
      [style.left.px]="sx(i)"
      [style.top.px]="sy(i)"
      [style.transform]="nodeTransform()"
      (mousedown)="onNodeMouseDown($event, i)">

    <button
      class="diagram-node"
      (click)="onNodeClick($event, node)">
      {{ node.label }}
    </button>
    </div>
  }

</div>
